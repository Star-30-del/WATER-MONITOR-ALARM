<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#F2F2F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ระบบตรวจสอบน้ำ">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<title>ระบบตรวจสอบน้ำ</title>
<style>
  :root{
    --bg:#F2F2F7; --card:#fff; --txt:#1C1C1E; --sub:#8E8E93;
    --blue:#0A84FF; --orange:#FF9500; --red:#FF3B30; --green:#22C55E; --sep:#E5E5EA;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,system-ui,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    background:#e5e5ea;color:var(--txt);
    min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
  }
  /* Phone frame on desktop; full-bleed on mobile */
  #stage{padding:40px;width:100%;display:flex;align-items:center;justify-content:center;}
  #device{
    position:relative;width:402px;height:min(874px,94vh);
    background:var(--bg);border-radius:52px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.28),0 0 0 12px #1a1a1c,0 0 0 14px #2c2c2e;
    display:flex;flex-direction:column;
  }
  @media (max-width:640px){
    body{display:block;background:var(--bg);}
    #stage{padding:0;}
    #device{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}
  }
  /* status bar */
  .statusbar{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;
    justify-content:space-between;padding:16px 30px 0;font-size:15px;font-weight:600;color:#1C1C1E;z-index:5;pointer-events:none;}
  .statusbar .icons{display:flex;align-items:center;gap:6px;}
  .app{flex:1;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}

  .hdr{padding:58px 20px 12px;flex-shrink:0;background:var(--bg);position:relative;z-index:2;}
  .title{font-size:28px;font-weight:700;color:#1C1C1E;letter-spacing:-.3px;}
  .row-between{display:flex;align-items:center;justify-content:space-between;}
  .badge{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:20px;}
  .badge .dot{width:7px;height:7px;border-radius:50%;}
  .badge span{font-size:13px;font-weight:600;}
  .sub{font-size:13px;color:var(--sub);}
  .back{display:flex;align-items:center;gap:4px;margin-bottom:6px;cursor:pointer;}
  .back span{color:var(--blue);font-size:17px;}

  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 120px;}

  .card{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .r18{border-radius:18px;}
  .pad{padding:16px;}

  input,textarea{width:100%;border:none;outline:none;font-size:16px;color:#1C1C1E;background:transparent;font-family:inherit;}
  textarea{resize:none;line-height:1.45;}
  input[type=range]{accent-color:var(--blue);}

  .btn{border-radius:18px;padding:14px 16px;text-align:center;font-size:16px;font-weight:600;cursor:pointer;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-white{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .note{font-size:13px;color:var(--sub);padding:0 4px 16px;line-height:1.5;}

  .setrow{display:flex;align-items:center;padding:14px 16px;border-bottom:.5px solid var(--sep);cursor:pointer;}
  .setrow:last-child{border-bottom:none;}
  .setico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0;}
  .setrow .nm{flex:1;font-size:16px;color:#1C1C1E;}
  .setrow .vv{font-size:15px;color:var(--sub);margin-right:6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .chip{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04);}

  .toast{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.92);
    color:#fff;font-size:14px;padding:10px 18px;border-radius:20px;z-index:40;white-space:nowrap;
    opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}

  .tabbar{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid #D1D1D6;
    display:flex;padding:8px 0 24px;z-index:30;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
  .tab span{font-size:10px;font-weight:600;}

  .toggle{width:51px;height:31px;border-radius:16px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
  .knob{position:absolute;top:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.2);transition:left .2s;}
  .step{width:30px;height:30px;border-radius:8px;background:#F2F2F7;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--blue);}

  /* tank animations */
  @keyframes wl-wave  { from{transform:translateX(0);}   to{transform:translateX(-96px);} }
  @keyframes wl-wave2 { from{transform:translateX(-96px);} to{transform:translateX(0);} }
  @keyframes wl-bob   { 0%,100%{transform:translateY(0);} 50%{transform:translateY(2.5px);} }
  @keyframes wl-bubble{ 0%{transform:translateY(0) scale(.6);opacity:0;} 15%{opacity:.7;} 100%{transform:translateY(-70px) scale(1);opacity:0;} }
  @keyframes wl-shake{ 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-8px);} 40%,80%{transform:translateX(8px);} }
  .pckey{width:70px;height:70px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:29px;font-weight:500;color:#1C1C1E;cursor:pointer;user-select:none;}
  .pckey:active{background:#E5E5EA;}
  .bub{position:absolute;border-radius:50%;}
  @media (prefers-reduced-motion:reduce){ .bub,[style*="wl-"]{animation:none!important;} }
</style>
</head>
<body>
<div id="stage">
  <div id="device">
    <div class="statusbar">
      <span id="sb-time">9:41</span>
      <span class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="#1C1C1E"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1" fill="#1C1C1E"/><rect x="9" y="2" width="3" height="10" rx="1" fill="#1C1C1E"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1C1C1E"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12"><rect x="1" y="1" width="20" height="10" rx="3" fill="none" stroke="#1C1C1E" stroke-opacity=".4"/><rect x="2.5" y="2.5" width="15" height="7" rx="1.5" fill="#1C1C1E"/><rect x="22" y="4" width="1.5" height="4" rx="1" fill="#1C1C1E" fill-opacity=".4"/></svg>
      </span>
    </div>
    <div class="app">
      <div id="hdr" class="hdr"></div>
      <div id="scroll" class="scroll"></div>
      <div id="toast" class="toast"></div>
      <div id="tabbar"></div>
    </div>
  </div>
</div>

<script>
"use strict";

/* ============================================================
   Water Monitor — real app (standalone PWA)
   Talks to the ESP32 /api/status + POST endpoints when a device
   address is configured & reachable (live mode); otherwise runs
   the built-in simulator (demo mode).
   ============================================================ */

var LS = window.localStorage;

var C = { blue:'#0A84FF', orange:'#FF9500', red:'#FF3B30', green:'#22C55E', sub:'#8E8E93' };

function fmtNow(){
  return new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function $(id){ return document.getElementById(id); }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function pad2(n){ return String(n).padStart(2,'0'); }

/* Built-in Firebase project — baked into the app so cloud mode works with no setup.
   (A Firebase web config is public by design; security is enforced by RTDB rules.) */
var FB_CONFIG = {
  apiKey: "AIzaSyBVjmhkcfZ2zu5yMELkTnmurloX0K0fcGE",
  authDomain: "water-monitor-oei2.firebaseapp.com",
  databaseURL: "https://water-monitor-oei2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "water-monitor-oei2",
  storageBucket: "water-monitor-oei2.firebasestorage.app",
  messagingSenderId: "59740657172",
  appId: "1:59740657172:web:9e36a46c58ba4927e2b901",
  measurementId: "G-57XL89N5KJ"
};

/* ---------- application state ---------- */
var S = {
  deviceUrl: LS.getItem('wa_device') || '',
  fbConfig:  LS.getItem('wa_fb_config') || JSON.stringify(FB_CONFIG),   // built-in by default
  deviceId:  LS.getItem('wa_device_id')  || 'wateralarm-1',
  mode:      LS.getItem('wa_mode') || 'cloud',   // default: built-in Firebase cloud
  connected: false,
  connected: false,
  _devPick:  null,
  pinLock:  LS.getItem('wa_pin_on') !== '0',   // lock Settings behind a PIN (default on)
  pin:      LS.getItem('wa_pin') || '1234',    // default PIN
  _unlocked: false,                            // session unlock flag
  _pcEntry:  '',                               // digits typed on the lock screen
  screen: 'dashboard',

  percent: 62,
  history: [30,32,35,40,44,50,55,58,60,63,66,70,73,75,74,70,66,60,54,48,44,40,38,36,40,45,50,55,58,60,61,62,62,61,62,62],
  historyFilter: 'all',
  simulating: false,
  simDir: 1,
  wifiConnected: true,
  lastUpdate: fmtNow(),
  log: [
    { id:3, level:'wifi',   message:'✅ ระบบ Online', time:'07:58' },
    { id:2, level:'medium', message:'🟡 แจ้งเตือน: ระดับน้ำ ≥ 50% (ปัจจุบัน 58%)', time:'06:40' },
    { id:1, level:'low',    message:'🔵 แจ้งเตือน: ระดับน้ำต่ำกว่า 25% (ปัจจุบัน 21%)', time:'05:12' },
  ],
  nextLogId: 4,
  currentBand: 2,

  highPct:75, medPct:50, lowPct:25, hystPct:3,
  msgHigh:'ระดับน้ำสูง', msgMedium:'ระดับน้ำปานกลาง', msgLow:'ระดับน้ำต่ำ กรุณาเติมน้ำ',
  adcMin:745, adcMax:3723, adc:2591, ma:13.9,

  ssid:'HomeWiFi_5G', wifiPassword:'secret1234',
  telegramToken:'8648529966:AAEgrg85mQ4kxmNzgy5C9tiesQdENSdCTrw', showToken:false,
  chatId:'-5181401248',
  morningEnabled:true, morningHour:8, msgMorning:'ระบบกำลังออนไลน์ปกติ',
};

/* ============================================================
   NETWORK LAYER
   ============================================================ */
function base(){
  var u = S.deviceUrl.trim();
  if(!u) return '';
  if(!/^https?:\/\//i.test(u)) u = 'http://' + u;
  return u.replace(/\/+$/,'');
}

function fetchTimeout(url, opts, ms){
  opts = opts || {};
  var ctrl = new AbortController();
  var t = setTimeout(function(){ ctrl.abort(); }, ms || 4000);
  opts.signal = ctrl.signal;
  return fetch(url, opts).finally(function(){ clearTimeout(t); });
}

function applyStatus(d){
  // Map ESP32 /api/status JSON onto our state
  if(typeof d.percent==='number') S.percent = Math.round(d.percent);
  if(typeof d.band==='number')    S.currentBand = d.band;
  if(typeof d.wifi==='boolean')   S.wifiConnected = d.wifi;
  if(d.lastUpdate) S.lastUpdate = d.lastUpdate;
  ['high:highPct','med:medPct','low:lowPct','hyst:hystPct','adcMin:adcMin','adcMax:adcMax','adc:adc']
    .forEach(function(p){ var k=p.split(':'); if(typeof d[k[0]]==='number') S[k[1]]=d[k[0]]; });
  if(typeof d.ma==='number' || typeof d.ma==='string') S.ma = d.ma;
  if(d.msgHigh!=null)   S.msgHigh   = d.msgHigh;
  if(d.msgMedium!=null) S.msgMedium = d.msgMedium;
  if(d.msgLow!=null)    S.msgLow    = d.msgLow;
  if(d.ssid!=null)      S.ssid      = d.ssid;
  if(d.token!=null)     S.telegramToken = d.token;
  if(d.chatId!=null)    S.chatId    = d.chatId;
  if(typeof d.morningEnabled==='boolean') S.morningEnabled = d.morningEnabled;
  if(typeof d.morningHour==='number')     S.morningHour   = d.morningHour;
  if(d.msgMorning!=null) S.msgMorning = d.msgMorning;
  // RTDB may return arrays as objects ({0:..,1:..}) — normalise to arrays
  var hist = toArray(d.history);
  if(hist && hist.length) S.history = hist.map(Number).filter(function(v){ return !isNaN(v); });
  var log = toArray(d.log);
  if(log){
    S.log = log.filter(Boolean).map(function(r,i){ return { id:i, level:r.level, message:r.message, time:r.time }; });
  }
}
function toArray(v){
  if(v==null) return null;
  if(Array.isArray(v)) return v;
  if(typeof v==='object') return Object.keys(v).sort(function(a,b){return a-b;}).map(function(k){ return v[k]; });
  return null;
}

/* refresh the visible screen from freshly-applied live data (LAN or cloud) */
function onLiveData(){
  if(S.screen==='dashboard') updateDashboard();
  else if(S.screen==='history') render();
  else if(S.screen==='calib') updateCalibLive();
  syncBadge();
}

/* --- LAN (HTTP) polling --- */
function poll(){
  if(S.mode!=='lan' || !base()) return Promise.resolve(false);
  return fetchTimeout(base()+'/api/status', {}, 4000)
    .then(function(r){ return r.json(); })
    .then(function(d){ S.connected=true; applyStatus(d); onLiveData(); return true; })
    .catch(function(){ S.connected=false; syncBadge(); return false; });
}

/* --- Cloud (Firebase Realtime Database) --- */
var _fbApp=null, _fbDb=null, _fbStatusRef=null, _fbConnRef=null;
function fbPaths(){ var id=(S.deviceId||'wateralarm-1').trim(); return { status:'devices/'+id+'/status', cmd:'devices/'+id+'/cmd' }; }
function fbDisconnect(){
  try{ if(_fbStatusRef) _fbStatusRef.off(); }catch(e){}
  try{ if(_fbConnRef) _fbConnRef.off(); }catch(e){}
  try{ if(_fbApp) _fbApp.delete(); }catch(e){}
  _fbApp=_fbDb=_fbStatusRef=_fbConnRef=null;
}
function fbConnect(){
  fbDisconnect();
  if(typeof firebase==='undefined'){ toast('โหลด Firebase SDK ไม่ได้ (ตรวจอินเทอร์เน็ต)'); return false; }
  var cfg;
  try{ cfg = parseFbConfig(S.fbConfig); }
  catch(e){ toast('firebaseConfig ไม่ถูกต้อง'); return false; }
  if(!cfg || !cfg.databaseURL){ toast('ต้องมี databaseURL ใน config'); return false; }
  try{
    _fbApp = firebase.initializeApp(cfg, 'wm-'+Date.now());
    _fbDb  = firebase.database(_fbApp);
  }catch(e){ toast('เริ่ม Firebase ไม่สำเร็จ'); return false; }
  var p = fbPaths();
  // "online" = the device has written status data (not merely that Firebase is reachable)
  _fbStatusRef = _fbDb.ref(p.status);
  _fbStatusRef.on('value', function(snap){
    var d = snap.val();
    if(d){ S.connected=true; applyStatus(d); onLiveData(); }
    else { S.connected=false; syncBadge(); }
  }, function(){ S.connected=false; syncBadge(); });
  return true;
}
// Accept a pasted firebaseConfig as JSON, a JS object literal, or a full snippet
function parseFbConfig(txt){
  txt = (txt||'').trim();
  if(!txt) return null;
  var m = txt.match(/\{[\s\S]*\}/);           // grab the {...} even if wrapped in code
  if(m) txt = m[0];
  try{ return JSON.parse(txt); }catch(e){}
  // tolerate unquoted keys / single quotes (JS object literal from the console)
  var fixed = txt.replace(/([{,]\s*)([A-Za-z0-9_]+)\s*:/g, '$1"$2":').replace(/'/g,'"').replace(/,(\s*})/g,'$1');
  return JSON.parse(fixed);
}
function fbSendCmd(action, obj){
  if(!_fbDb) return Promise.resolve(false);
  var payload = Object.assign({ action:action, ts: Date.now() }, obj||{});
  return _fbDb.ref(fbPaths().cmd).set(payload).then(function(){ return true; }).catch(function(){ return false; });
}

/* --- unified command sender: routes by connection mode --- */
function postForm(path, obj){
  var action = path.split('/').pop();               // '/api/thresholds' -> 'thresholds'
  if(S.mode==='cloud'){
    if(!_fbDb) return Promise.resolve({ok:false, error:'ยังไม่เชื่อมต่อ Firebase'});
    return fbSendCmd(action, obj).then(function(ok){ return ok ? {ok:true} : {ok:false, error:'ส่งคำสั่งไม่สำเร็จ'}; });
  }
  if(S.mode!=='lan' || !base()) return Promise.resolve({ok:true, demo:true});
  var body = new URLSearchParams(obj).toString();
  return fetchTimeout(base()+path, {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:body
  }, 6000).then(function(r){ return r.json(); })
   .catch(function(){ return {ok:false, error:'เชื่อมต่ออุปกรณ์ไม่ได้'}; });
}

/* live status-bar clock */
function tickClock(){ var t=$('sb-time'); if(t) t.textContent = new Date().toLocaleTimeString('th-TH',{hour:'numeric',minute:'2-digit'}); }

/* ============================================================
   SIMULATOR (demo mode) — mirrors the design logic
   ============================================================ */
function decideBand(w, cur){
  var up   = w>=S.highPct ? 3 : w>=S.medPct ? 2 : w>=S.lowPct ? 1 : 0;
  var down = w>=S.highPct-S.hystPct ? 3 : w>=S.medPct-S.hystPct ? 2 : w>=S.lowPct-S.hystPct ? 1 : 0;
  if(up>cur) return up;
  if(down<cur) return down;
  return cur;
}
function bandMessage(band, w){
  var cur = ' (ปัจจุบัน '+w+'%)';
  if(band===3) return { level:'high',   message:'🔴 '+S.msgHigh+cur };
  if(band===2) return { level:'medium', message:'🟡 '+S.msgMedium+cur };
  if(band===0) return { level:'low',    message:'🔵 '+S.msgLow+cur };
  return null;
}
function applyPercent(next){
  next = clamp(Math.round(next),0,100);
  var newBand = decideBand(next, S.currentBand);
  var changed = newBand !== S.currentBand;
  var entry = changed ? bandMessage(newBand, next) : null;
  if(entry){ S.log = [{ id:S.nextLogId++, level:entry.level, message:entry.message, time:fmtNow() }].concat(S.log); }
  S.percent = next;
  S.currentBand = newBand;
  S.history = S.history.concat(next).slice(-48);
  S.adc = Math.round(S.adcMin + (next/100)*((S.adcMax-S.adcMin)||1));
  S.ma  = (4 + (next/100)*16).toFixed(1);
  S.lastUpdate = fmtNow();
}
var _simTimer=null;
function toggleSimulate(){
  if(S.simulating){ clearInterval(_simTimer); S.simulating=false; syncSimBtn(); return; }
  S.simulating=true; syncSimBtn();
  _simTimer=setInterval(function(){
    var dir=S.simDir, next=S.percent+dir*2;
    if(next>=100){ next=100; dir=-1; }
    if(next<=0){ next=0; dir=1; }
    S.simDir=dir;
    applyPercent(next);
    updateDashboard();
  },200);
}
function stopSim(){ if(S.simulating){ clearInterval(_simTimer); S.simulating=false; } }

/* ============================================================
   TOAST
   ============================================================ */
var _toastTimer=null;
function toast(msg){
  var t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){ t.classList.remove('show'); },1600);
}

/* ============================================================
   DERIVED VIEW VALUES
   ============================================================ */
function derive(){
  var band=S.currentBand, p=Math.round(S.percent);
  var statusColor=C.blue, statusLabel='ปกติ';
  if(band===0){ statusColor=C.red;    statusLabel='น้ำน้อย'; }
  else if(band===3){ statusColor=C.green;  statusLabel='เต็ม'; }
  else if(band===2){ statusColor=C.orange; statusLabel='ระดับกลาง'; }
  var low=band===0;
  return {
    band:band, p:p, statusColor:statusColor, statusLabel:statusLabel, low:low,
    tankTop: low?'#FF6961':'#5AC8FA', tankBot: low?'#FF3B30':'#0A84FF',
    h: band===3, m: band===2, l: band===0
  };
}

/* ============================================================
   REUSABLE MARKUP
   ============================================================ */
function chevron(){ return '<svg width="7" height="12" viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke="#C7C7CC" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"></path></svg>'; }

function waveMarkup(){
  return ''
   +'<div style="position:absolute;top:-8px;left:0;right:0;height:14px;animation:wl-bob 3s ease-in-out infinite;">'
     +'<svg width="192" height="20" viewBox="0 0 192 20" preserveAspectRatio="none" style="position:absolute;top:0;left:0;animation:wl-wave2 4.2s linear infinite;opacity:.28"><path d="M0 8 Q12 2 24 8 T48 8 T72 8 T96 8 T120 8 T144 8 T168 8 T192 8 V20 H0 Z" fill="#fff"></path></svg>'

function chartSVG(){
  var hist = (S.history&&S.history.length)?S.history:[Math.round(S.percent)];
  var W=320,H=150,padT=12,padB=12,plotH=H-padT-padB,n=hist.length;
  function xAt(i){ return n<=1?0:(i/(n-1))*W; }
  function yAt(v){ return padT+(1-v/100)*plotH; }
  var d=derive();
  var pts=hist.map(function(v,i){ return xAt(i).toFixed(1)+','+yAt(v).toFixed(1); }).join(' ');
  var area='M0,'+H+' '+hist.map(function(v,i){ return 'L'+xAt(i).toFixed(1)+','+yAt(v).toFixed(1); }).join(' ')+' L'+W+','+H+' Z';
  var lx=xAt(n-1).toFixed(1), ly=yAt(hist[n-1]).toFixed(1);
  var fill=d.low?'rgba(255,59,48,.12)':'rgba(10,132,255,.12)';
  function ln(v,c){ return '<line x1="0" y1="'+yAt(v).toFixed(1)+'" x2="320" y2="'+yAt(v).toFixed(1)+'" stroke="'+c+'" stroke-width="1" stroke-dasharray="3 4" opacity=".4" vector-effect="non-scaling-stroke"></line>'; }
  return '<svg width="100%" height="150" viewBox="0 0 320 150" preserveAspectRatio="none" style="display:block;overflow:visible">'
    +ln(S.highPct,'#0A84FF')+ln(S.medPct,'#FF9500')+ln(S.lowPct,'#FF3B30')
    +'<path d="'+area+'" fill="'+fill+'"></path>'
    +'<polyline points="'+pts+'" fill="none" stroke="'+d.statusColor+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"></polyline>'
    +'<circle cx="'+lx+'" cy="'+ly+'" r="4" fill="'+d.statusColor+'" stroke="#fff" stroke-width="2"></circle></svg>';
}

function setDevMode(k){ S._devPick=k; render(); }
function connectDevice(){
  var v=$('dev_addr').value.trim();
  if(!v){ toast('กรุณากรอกที่อยู่อุปกรณ์'); return; }
  fbDisconnect();
  S.deviceUrl=v; LS.setItem('wa_device',v);
  S.mode='lan'; LS.setItem('wa_mode','lan'); S._devPick=null; S.connected=false; stopSim();
  toast('กำลังเชื่อมต่อ…');

function connectCloud(){
  var cfg=$('fb_cfg').value.trim(), id=($('fb_id').value.trim()||'wateralarm-1');
  if(!cfg){ toast('กรุณาวาง firebaseConfig'); return; }
  try{ var parsed=parseFbConfig(cfg); if(!parsed || !parsed.databaseURL) throw 0; }
  catch(e){ toast('firebaseConfig ไม่ถูกต้อง (ต้องมี databaseURL)'); return; }
  S.fbConfig=cfg; S.deviceId=id;
  LS.setItem('wa_fb_config',cfg); LS.setItem('wa_device_id',id);
  S.mode='cloud'; LS.setItem('wa_mode','cloud'); S._devPick=null; S.connected=false; stopSim();
  toast('กำลังเชื่อมต่อ Firebase…');
  if(fbConnect()) nav('dashboard');
}
function useDemo(){
  fbDisconnect();
  S.mode='demo'; LS.setItem('wa_mode','demo'); S.connected=false; S._devPick=null;
  toast('เข้าสู่โหมดทดลอง'); nav('dashboard');

    +nr('#0A84FF','ระดับสูง (High)','t_high',S.highPct)

  h+='<div class="note">เงื่อนไข: ต่ำ &lt; กลาง &lt; สูง (0–100%) ระบบจะแจ้งเตือนเฉพาะเมื่อ<b>เปลี่ยนระดับ</b>เท่านั้น</div>';
  h+='<div class="btn btn-primary" onclick="saveThresholds()">บันทึก</div>';
  return h;
}
function saveThresholds(){
  var high=+$('t_high').value, med=+$('t_med').value, low=+$('t_low').value, hyst=+$('t_hyst').value;
  if(!(low>=0 && low<med && med<high && high<=100 && hyst>=0 && hyst<=20)){ toast('ค่าไม่ถูกต้อง: ต่ำ < กลาง < สูง (0–100)'); return; }
  postForm('/api/thresholds',{high:high, med:med, low:low, hyst:hyst}).then(function(r){
    if(r.ok){ S.highPct=high; S.medPct=med; S.lowPct=low; S.hystPct=hyst; S.currentBand=decideBand(S.percent,1); toast('บันทึกเกณฑ์แล้ว ✓'); }
    else toast(r.error||'ค่าไม่ถูกต้อง');
  });
}

function toggleMorning(){ S.morningEnabled=!S.morningEnabled; var t=$('m_tog'); t.style.background=S.morningEnabled?'#34C759':'#E5E5EA'; t.firstChild.style.left=(S.morningEnabled?22:2)+'px'; }
function hourStep(d){ _mHour=(_mHour+d+24)%24; $('m_hr').textContent=pad2(_mHour)+':00'; updateMorningPreview(); }
function updateMorningPreview(){ var msg=$('m_msg')?$('m_msg').value:S.msgMorning; $('m_prev').textContent='☀️ รายงานสถานะ '+pad2(_mHour)+':00 น. '+msg; }
function saveMorning(){
  var msg=$('m_msg').value;
  postForm('/api/morning',{enabled:S.morningEnabled?1:0, hour:_mHour, msg:msg}).then(function(r){
    if(r.ok){ S.morningHour=_mHour; S.msgMorning=msg; toast('บันทึกแล้ว ✓'); } else toast('ผิดพลาด');
  });
}

/* ---- ADC calibration ---- */
function viewCalib(){
  var h='<div class="row-between" style="background:#EAF0FF;border-radius:14px;padding:14px 16px;margin-bottom:16px;">'
    +'<div><div style="font-size:12px;color:#5A6B8C;">ค่าที่อ่านได้ปัจจุบัน</div><div style="font-size:22px;font-weight:700;color:#0A84FF;"><span id="cal_adc">'+S.adc+'</span> <span style="font-size:13px;font-weight:600;color:#8E8E93;">ADC</span></div></div>'
    +'<div style="text-align:right;"><div style="font-size:12px;color:#5A6B8C;">กระแส</div><div style="font-size:22px;font-weight:700;color:#0A84FF;"><span id="cal_ma">'+S.ma+'</span> <span style="font-size:13px;font-weight:600;color:#8E8E93;">mA</span></div></div>'
  +'</div>';
  h+='<div class="card r18" style="padding:4px 16px;margin-bottom:12px;">'
    +'<div style="padding:12px 0;border-bottom:.5px solid #E5E5EA;"><div style="font-size:13px;color:#8E8E93;margin-bottom:6px;">ADC ที่ 4mA (0%)</div><input type="number" id="c_min" value="'+S.adcMin+'" style="font-family:monospace;"></div>'
    +'<div style="padding:12px 0;"><div style="font-size:13px;color:#8E8E93;margin-bottom:6px;">ADC ที่ 20mA (100%)</div><input type="number" id="c_max" value="'+S.adcMax+'" style="font-family:monospace;"></div>'
  +'</div>';
  h+='<div class="note">ปรับค่า ADC ให้ตรงกับสัญญาณ 4–20mA หน้างานจริง ระบบเฉลี่ยค่า 16 ครั้งเพื่อกรองสัญญาณรบกวน และใช้ hysteresis กันการแจ้งเตือนซ้ำ</div>';
  h+='<div class="btn btn-primary" onclick="saveCalib()">บันทึก</div>';
  return h;
}
function updateCalibLive(){ var a=$('cal_adc'), m=$('cal_ma'); if(a) a.textContent=S.adc; if(m) m.textContent=S.ma; }
function saveCalib(){
  var mn=+$('c_min').value, mx=+$('c_max').value;
  if(mx<=mn){ toast('ADC 20mA ต้องมากกว่า 4mA'); return; }
  postForm('/api/calib',{adcMin:mn, adcMax:mx}).then(function(r){
    if(r.ok){ S.adcMin=mn; S.adcMax=mx; toast('บันทึกแล้ว ✓'); } else toast(r.error||'ผิดพลาด');
  });
}

/* ============================================================
   TAB BAR + ROUTER
   ============================================================ */
function tabbar(){
  function col(s){ var cur = (S.screen==='pinlock'?'settings':S.screen); return cur===s?'#0A84FF':'#8E8E93'; }
  return '<div class="tabbar">'
    +'<div class="tab" onclick="nav(\'dashboard\')"><svg width="24" height="22" viewBox="0 0 24 22"><path d="M12 1l11 9h-3v11H4V10H1l11-9z" fill="'+col('dashboard')+'"></path></svg><span style="color:'+col('dashboard')+';">หน้าหลัก</span></div>'
    +'<div class="tab" onclick="nav(\'history\')"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20z" fill="none" stroke="'+col('history')+'" stroke-width="2"></path><path d="M12 7v5l4 2" stroke="'+col('history')+'" stroke-width="2" fill="none" stroke-linecap="round"></path></svg><span style="color:'+col('history')+';">ประวัติ</span></div>'
    +'<div class="tab" onclick="nav(\'settings\')"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 8a4 4 0 100 8 4 4 0 000-8z" fill="none" stroke="'+col('settings')+'" stroke-width="2"></path><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="'+col('settings')+'" stroke-width="1.8" stroke-linecap="round"></path></svg><span style="color:'+col('settings')+';">ตั้งค่า</span></div>'
  +'</div>';
}

function render(){
  var body;
  switch(S.screen){
    case 'history':    body=viewHistory(); break;
    case 'settings':   body=viewSettings(); break;
    case 'pinlock':    body=viewPinlock(); break;
    case 'pin':        body=viewPin(); break;
    case 'device':     body=viewDevice(); break;
    case 'wifi':       body=viewWifi(); break;
    case 'telegram':   body=viewTelegram(); break;
    case 'thresholds': body=viewThresholds(); break;
    case 'messages':   body=viewMessages(); break;
    case 'morning':    body=viewMorning(); break;
    case 'calib':      body=viewCalib(); break;
    default:           body=viewDashboard();
  }
  renderHeader();
  $('scroll').innerHTML=body;
  var showTab=['dashboard','history','settings','pinlock'].indexOf(S.screen)>=0;
  $('tabbar').innerHTML=showTab?tabbar():'';
}

function nav(s){
  if(s==='settings' && S.pinLock && !S._unlocked){ s='pinlock'; S._pcEntry=''; }  // gate settings
  if(s!=='morning') _mHour=null;
  if(s!=='device') S._devPick=null;
  if(s!=='dashboard') stopSim();
  S.screen=s;
  render();
  $('scroll').scrollTop=0;
}
function onSlider(v){ if(S.simulating) toggleSimulate(); applyPercent(+v); updateDashboard(); }

/* expose handlers to inline onclick/oninput */
Object.assign(window,{
  nav:nav, setFilter:setFilter, clearHistory:clearHistory, onSlider:onSlider, toggleSimulate:toggleSimulate,
  connectDevice:connectDevice, connectCloud:connectCloud, setDevMode:setDevMode, useDemo:useDemo, forgetWifi:forgetWifi,
  toggleToken:toggleToken, onTokenEdit:onTokenEdit, saveTelegram:saveTelegram, testTelegram:testTelegram,
  saveThresholds:saveThresholds, saveMessages:saveMessages,
  toggleMorning:toggleMorning, hourStep:hourStep, updateMorningPreview:updateMorningPreview, saveMorning:saveMorning,
  saveCalib:saveCalib,
  pcPress:pcPress, pcDel:pcDel, togglePinLock:togglePinLock, savePin:savePin
});

/* ============================================================
   BOOT
   ============================================================ */
render();
tickClock();
setInterval(tickClock, 15000);
if(S.mode==='lan' && base()){
  poll().then(function(ok){ if(!ok) toast('เชื่อมต่ออุปกรณ์ไม่ได้ — แสดงข้อมูลล่าสุด'); });
} else if(S.mode==='cloud' && S.fbConfig){
  fbConnect();
}
setInterval(function(){ if(S.mode==='lan') poll(); }, 2000);

/* service worker (offline shell) */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); });
}
</script>
</body>
</html>
