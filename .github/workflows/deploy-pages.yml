name: Deploy PWA to GitHub Pages

# Publishes the app/ folder (the web app) to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload app/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
